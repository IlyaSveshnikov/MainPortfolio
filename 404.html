<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#07070a" />
  <meta name="robots" content="noindex" />
  <title>404 — страница потерялась</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%2307070a'/%3E%3Ctext x='50' y='68' font-size='58' font-family='monospace' font-weight='700' text-anchor='middle' fill='%23ccf24c'%3E%E2%9C%B3%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;800;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 24px;
      background:
        radial-gradient(60% 60% at 25% 25%, rgba(124,92,255,.28), transparent 60%),
        radial-gradient(50% 50% at 80% 30%, rgba(53,224,198,.18), transparent 60%),
        #07070a;
      color: #edede8; font-family: "JetBrains Mono", monospace;
    }
    .code { font-family: "Unbounded", sans-serif; font-weight: 900; font-size: clamp(90px, 26vw, 240px); line-height: .9; letter-spacing: -.04em;
      background: linear-gradient(105deg, #ccf24c, #35e0c6 55%, #7c5cff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: rgba(237,237,232,.6); margin: 14px 0 30px; font-size: 15px; }
    a { display: inline-flex; align-items: center; gap: 8px; background: #ccf24c; color: #07070a; text-decoration: none;
      padding: 14px 26px; border-radius: 100px; font-weight: 500; transition: transform .3s; }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <p>Страница потерялась в цифровом пространстве.</p>
    <a href="/">← Вернуться на главную</a>
  </div>
</body>
</html>
